version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: backend_container
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/proyecto_so2
      - SERIAL_PORT=/dev/ttyUSB0
      - SERIAL_BAUD=9600
    depends_on:
      - mongodb
    networks:
      - app_network

  frontend:
    image: nginx:alpine
    container_name: frontend_container
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
